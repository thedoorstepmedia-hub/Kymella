<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>All Weddings — Founder Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E1F1C; --ink-2:#152D28; --ink-3:#26433C;
  --mist:#F5EFE3; --mist-dim:#EDE5D4;
  --brass:#B8874A; --brass-soft:#E8C9A0; --brass-deep:#8E6836;
  --line:rgba(14,31,28,.12);
  --disp:'Fraunces',Georgia,serif; --body:'Inter',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);background:var(--mist);color:var(--ink);font-size:14.5px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:var(--body);cursor:pointer;border:none;background:none}
input{font-family:var(--body);font-size:15px}
a{color:inherit;text-decoration:none}
:focus-visible{outline:2px solid var(--brass);outline-offset:3px}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;color:var(--brass-deep)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-radius:1px}
.btn-brass{background:var(--brass);color:var(--ink)}
.btn-quiet{border:1px solid var(--line);color:var(--ink)}
.btn-quiet:hover{border-color:var(--brass)}

.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-box{max-width:380px;width:100%;text-align:center}
.gate h1{font-family:var(--disp);font-size:28px;font-weight:500;margin:12px 0 22px}
.gate input{width:100%;border:1px solid var(--line);padding:14px 16px;outline:none;margin-bottom:14px;background:#fff}
.gate-error{color:#A4523F;font-size:13px;margin-top:12px;display:none}

.app{display:none;max-width:960px;margin:0 auto;padding:44px 22px 90px}
.top{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px;margin-bottom:30px}
.top h1{font-family:var(--disp);font-size:30px;font-weight:500}
.count{font-family:var(--mono);font-size:12px;color:var(--ink-3)}

.wcard{background:#fff;border:1px solid var(--line);display:grid;grid-template-columns:1fr auto auto auto;gap:16px;align-items:center;padding:20px 22px;margin-bottom:12px}
@media(max-width:680px){.wcard{grid-template-columns:1fr;text-align:left}}
.wcard .names{font-family:var(--disp);font-size:20px;font-weight:600}
.wcard .sub{font-size:12.5px;color:var(--ink-3);margin-top:3px}
.wcard .stat{text-align:center}
.wcard .stat b{font-family:var(--disp);font-size:22px;font-weight:600;display:block}
.wcard .stat span{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
.empty{text-align:center;padding:60px 20px;color:var(--ink-3)}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-box">
    <div class="eyebrow">Founder Dashboard</div>
    <h1>Every wedding, one key</h1>
    <input type="password" id="keyInput" placeholder="Your setup bypass key" autocomplete="off">
    <button class="btn btn-brass" style="width:100%" id="unlockBtn">View all weddings</button>
    <p class="gate-error" id="gateError">That key didn't work.</p>
  </div>
</div>

<div class="app" id="app">
  <div class="top">
    <h1>All weddings</h1>
    <div class="count" id="countLabel"></div>
  </div>
  <div id="list"></div>
</div>

<script>
const API = "https://evarria-backend-production.up.railway.app";
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
let ADMIN_KEY = sessionStorage.getItem("kymella_founder_key") || "";

async function load(key){
  try{
    const r = await fetch(`${API}/api/admin/weddings`, { headers: { "x-setup-key": key } });
    if (r.status === 401) return { ok:false };
    if (!r.ok) throw new Error("request failed");
    return { ok:true, data: await r.json() };
  }catch(e){ return { ok:false, network:true }; }
}
function render(data){
  $("countLabel").textContent = `${data.count} ${data.count===1?"wedding":"weddings"}`;
  if (!data.weddings.length){
    $("list").innerHTML = `<div class="empty">No weddings yet.</div>`;
    return;
  }
  $("list").innerHTML = data.weddings.map(w => {
    const names = `${w.partner1} & ${w.partner2}`;
    const sub = [w.wedding_date, w.venue].filter(Boolean).join(" · ");
    // The founder key works as a universal admin key for every wedding —
    // no need to track each wedding's individual key separately.
    const manageUrl = `${API}/manage#w=${w.id}&k=${encodeURIComponent(ADMIN_KEY)}`;
    return `
      <a class="wcard" href="${manageUrl}" target="_blank">
        <div><div class="names">${esc(names)}</div><div class="sub">${esc(sub)}</div></div>
        <div class="stat"><b>${w.guest_count}</b><span>Invited</span></div>
        <div class="stat"><b>${w.accepted_count}</b><span>Accepted</span></div>
        <div class="btn btn-quiet">Open dashboard</div>
      </a>`;
  }).join("");
}
async function unlock(key){
  const result = await load(key);
  if (!result.ok){
    $("gateError").style.display = "block";
    $("gateError").textContent = result.network ? "Couldn't reach the server." : "That key didn't work.";
    return;
  }
  sessionStorage.setItem("kymella_founder_key", key);
  ADMIN_KEY = key;
  $("gate").style.display = "none";
  $("app").style.display = "block";
  render(result.data);
}
$("unlockBtn").addEventListener("click", () => { const k=$("keyInput").value.trim(); if(k) unlock(k); });
$("keyInput").addEventListener("keydown", e => { if (e.key==="Enter") $("unlockBtn").click(); });
if (ADMIN_KEY) unlock(ADMIN_KEY);
</script>
</body>
</html>
