<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Waitlist — Kymella</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E1F1C; --ink-2:#152D28; --ink-3:#26433C;
  --mist:#F5EFE3; --mist-dim:#EDE5D4;
  --brass:#B8874A; --brass-soft:#E8C9A0; --brass-deep:#8E6836;
  --line:rgba(14,31,28,.12);
  --disp:'Fraunces',Georgia,serif; --body:'Inter',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);background:var(--mist);color:var(--ink);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:var(--body);cursor:pointer;border:none;background:none}
input{font-family:var(--body);font-size:15px}
:focus-visible{outline:2px solid var(--brass);outline-offset:3px}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:500;color:var(--brass-deep)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;font-size:12.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-radius:1px;transition:background .2s}
.btn-brass{background:var(--brass);color:var(--ink)}
.btn-brass:hover{background:var(--brass-soft)}
.btn-quiet{border:1px solid var(--line);color:var(--ink)}
.btn-quiet:hover{border-color:var(--brass)}

.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-box{max-width:380px;width:100%;text-align:center}
.gate h1{font-family:var(--disp);font-size:28px;font-weight:500;margin:12px 0 22px}
.gate input{width:100%;border:1px solid var(--line);padding:14px 16px;outline:none;margin-bottom:14px;background:#fff}
.gate input:focus{border-color:var(--brass)}
.gate-error{color:#A4523F;font-size:13px;margin-top:12px;display:none}

.app{display:none;max-width:820px;margin:0 auto;padding:50px 24px 80px}
.top{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px;margin-bottom:36px}
.top h1{font-family:var(--disp);font-size:32px;font-weight:500}
.count{font-family:var(--mono);font-size:12px;color:var(--ink-3)}
.row{display:grid;grid-template-columns:1fr 1fr auto auto;gap:16px;align-items:center;padding:16px 4px;border-bottom:1px solid var(--line)}
.row.head{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);border-bottom:1px solid var(--ink)}
.row .name{font-weight:600}
.row .email{color:var(--ink-3);font-size:13.5px}
.row .date{font-family:var(--mono);font-size:11.5px;color:var(--ink-3)}
@media(max-width:640px){.row{grid-template-columns:1fr;gap:4px;padding:16px 4px}.row.head{display:none}.row .date{order:3}.row .copy{order:4;justify-self:start;margin-top:4px}}
.empty{text-align:center;padding:60px 20px;color:var(--ink-3)}
.notice{position:fixed;bottom:0;left:0;right:0;background:var(--ink);color:var(--mist);font-size:13px;text-align:center;padding:13px;transform:translateY(100%);transition:transform .35s;z-index:50}
.notice.on{transform:none}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-box">
    <div class="eyebrow">Kymella</div>
    <h1>Waitlist</h1>
    <input type="password" id="keyInput" placeholder="Admin key" autocomplete="off">
    <button class="btn btn-brass" style="width:100%" id="unlockBtn">View signups</button>
    <p class="gate-error" id="gateError">That key didn't work. Try again.</p>
  </div>
</div>

<div class="app" id="app">
  <div class="top">
    <h1>Waitlist</h1>
    <div class="count" id="countLabel"></div>
  </div>
  <div id="list"></div>
  <div style="margin-top:28px">
    <button class="btn btn-quiet" id="refreshBtn">Refresh</button>
  </div>
</div>

<div class="notice" id="notice"></div>

<script>
const API = "https://evarria-backend-production.up.railway.app/api/kymella-waitlist";
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
function notice(m){ const n=$("notice"); n.textContent=m; n.classList.add("on"); clearTimeout(n._t); n._t=setTimeout(()=>n.classList.remove("on"),2400); }

let ADMIN_KEY = sessionStorage.getItem("kymella_admin_key") || "";

async function load(key){
  try{
    const r = await fetch(API, { headers: { "x-setup-key": key } });
    if (r.status === 401) return { ok:false };
    if (!r.ok) throw new Error("request failed");
    const data = await r.json();
    return { ok:true, data };
  } catch(e){
    return { ok:false, network:true };
  }
}

function render(data){
  $("countLabel").textContent = `${data.count} ${data.count === 1 ? "signup" : "signups"}`;
  if (!data.signups.length){
    $("list").innerHTML = `<div class="empty">No signups yet. Once the page is live, they'll show up here.</div>`;
    return;
  }
  const rows = data.signups.map(s => `
    <div class="row">
      <div class="name">${esc(s.name)}</div>
      <div class="email">${esc(s.email)}</div>
      <div class="date">${esc(s.created_at)}</div>
      <button class="btn btn-quiet copy" data-email="${esc(s.email)}" style="padding:8px 14px;font-size:11px">Copy email</button>
    </div>`).join("");
  $("list").innerHTML = `
    <div class="row head"><div>Name</div><div>Email</div><div>Joined</div><div></div></div>
    ${rows}`;
  $("list").querySelectorAll(".copy").forEach(btn => {
    btn.addEventListener("click", () => {
      navigator.clipboard.writeText(btn.dataset.email).then(() => notice("Email copied."));
    });
  });
}

async function unlock(key){
  const result = await load(key);
  if (!result.ok){
    $("gateError").style.display = "block";
    $("gateError").textContent = result.network ? "Couldn't reach the server. Check your connection." : "That key didn't work. Try again.";
    return;
  }
  sessionStorage.setItem("kymella_admin_key", key);
  ADMIN_KEY = key;
  $("gate").style.display = "none";
  $("app").style.display = "block";
  render(result.data);
}

$("unlockBtn").addEventListener("click", () => {
  const key = $("keyInput").value.trim();
  if (!key) return;
  unlock(key);
});
$("keyInput").addEventListener("keydown", e => { if (e.key === "Enter") $("unlockBtn").click(); });

$("refreshBtn").addEventListener("click", async () => {
  const result = await load(ADMIN_KEY);
  if (result.ok) { render(result.data); notice("Refreshed."); }
  else notice("Couldn't refresh. Your key may have changed.");
});

// auto-unlock if a key is already remembered for this browser tab session
if (ADMIN_KEY) unlock(ADMIN_KEY);
</script>
</body>
</html>
