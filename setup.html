<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Create your wedding: Kymella</title>
<meta name="description" content="Set up your wedding in about ten minutes.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%231C2B23'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-family='Georgia' font-size='14' fill='%23C6A15B'%3E%26%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,ital@9..144,300..700,0..1&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --ink:#0E1F1C; --ink-2:#152D28; --ink-3:#26433C;
  --ivory:#F5EFE3; --ivory-2:#EDE5D4; --paper:#FFFFFF;
  --sage:#6E8880; --sage-soft:#BFCFC9;
  --gold:#B8874A; --gold-soft:#E8C9A0; --gold-deep:#8E6836;
  --line:rgba(14,31,28,.12);
  --disp:'Fraunces',Georgia,serif; --body:'Inter',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);background:var(--ivory);color:var(--ink);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--body);font-size:16px}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:2px}
svg.i{width:17px;height:17px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;vertical-align:-3px}

.label{font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-deep);font-weight:600}
.label.muted{color:var(--sage)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:15px 32px;font-weight:600;font-size:13.5px;letter-spacing:.08em;text-transform:uppercase;transition:background .25s,border-color .25s,color .25s,opacity .25s;border-radius:2px}
.btn-solid{background:var(--ink);color:var(--ivory)}
.btn-solid:hover{background:var(--ink-2)}
.btn-solid:disabled{opacity:.35;cursor:default}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:#C7A55F}
.btn-quiet{border:1px solid var(--line);color:var(--ink)}
.btn-quiet:hover{border-color:var(--gold)}
.btn.sm{padding:11px 20px;font-size:12px}
.textlink{font-size:13px;font-weight:600;color:var(--gold-deep);border-bottom:1px solid var(--gold-soft);padding-bottom:1px;transition:border-color .2s}
.textlink:hover{border-color:var(--gold-deep)}

/* ---- wizard frame ---- */
.topbar{position:sticky;top:0;background:var(--ivory);border-bottom:1px solid var(--line);z-index:50}
.topbar-in{max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:16px 22px}
.wordmark{font-family:var(--disp);font-size:19px;font-weight:600}
.wordmark span{color:var(--gold-deep);font-style:italic}
.progress{height:2px;background:var(--ivory-2)}
.progress i{display:block;height:100%;background:var(--gold);transition:width .5s cubic-bezier(.22,1,.36,1);width:0}
.step-count{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--sage);font-weight:600}

.wrap{max-width:640px;margin:0 auto;padding:52px 22px 120px}
.screen{animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.h1{font-family:var(--disp);font-size:clamp(30px,6vw,42px);font-weight:500;line-height:1.15;margin:12px 0 10px}
.lede{font-size:15px;color:var(--ink-3);max-width:480px}
.hint{font-size:13px;color:var(--sage);margin-top:8px}

.field{margin:22px 0}
.field label{display:block;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--sage);margin-bottom:9px}
.field label em{font-style:normal;text-transform:none;letter-spacing:0;color:var(--sage);font-weight:400;font-size:11.5px}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);padding:15px;background:var(--paper);color:var(--ink);outline:none;transition:border-color .2s;border-radius:0;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold)}
.field textarea{resize:vertical;min-height:92px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.two{grid-template-columns:1fr}}

.nav{display:flex;gap:12px;justify-content:space-between;margin-top:40px;align-items:center}
.nav .right{display:flex;gap:12px;align-items:center}

/* event / hotel / fund / guest rows */
.rowcard{background:var(--paper);border:1px solid var(--line);padding:18px;margin-bottom:12px;position:relative}
.rowcard .rm{position:absolute;top:10px;right:10px;width:30px;height:30px;color:var(--sage);font-size:17px;line-height:1;transition:color .2s}
.rowcard .rm:hover{color:var(--ink)}
.rowgrid{display:grid;grid-template-columns:110px 110px 1fr;gap:10px}
.rowgrid input{border:1px solid var(--line);padding:11px 12px;outline:none;width:100%}
.rowgrid input:focus{border-color:var(--gold)}
.rowcard .sub{margin-top:10px;display:grid;grid-template-columns:minmax(0,1fr);gap:10px}
.rowcard .sub input{border:1px solid var(--line);padding:11px 12px;outline:none;width:100%}
.rowcard .sub input:focus{border-color:var(--gold)}
@media(max-width:560px){.rowgrid{grid-template-columns:1fr 1fr}.rowgrid input:last-child{grid-column:1/-1}}
.addrow{width:100%;border:1px dashed var(--sage-soft);padding:15px;color:var(--ink-3);font-weight:600;font-size:13.5px;letter-spacing:.04em;transition:border-color .2s,background .2s;margin-top:2px}
.addrow:hover{border-color:var(--gold);background:#FDFBF5}

.tglrow{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:15px 2px;border-bottom:1px solid var(--line)}
.tglrow:last-child{border:none}
.tglrow .t{font-weight:600;font-size:14.5px}
.tglrow .d{font-size:12.5px;color:var(--ink-3)}
.tgl{width:40px;height:22px;border-radius:99px;background:var(--line);position:relative;transition:background .25s;flex-shrink:0}
.tgl::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:var(--paper);top:3px;left:3px;transition:left .25s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.tgl.on{background:var(--gold)}
.tgl.on::after{left:21px}

/* story prompts */
.prompt{background:var(--paper);border:1px solid var(--line);padding:22px;margin-bottom:14px}
.prompt .pq{font-family:var(--disp);font-size:20px;font-weight:500;margin-bottom:12px}
.prompt input{width:90px;border:1px solid var(--line);padding:10px 12px;outline:none;margin-bottom:10px}
.prompt textarea{width:100%;border:1px solid var(--line);padding:12px;outline:none;min-height:76px;resize:vertical}
.prompt input:focus,.prompt textarea:focus{border-color:var(--gold)}

/* guests paste */
.paste{width:100%;border:1px solid var(--line);padding:15px;min-height:150px;outline:none;font-size:14.5px;line-height:1.8;background:var(--paper);resize:vertical}
.import-divider{display:flex;align-items:center;gap:14px;margin:22px 0;color:var(--ink-3);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.photo-drop{border:1.5px dashed var(--line);padding:26px;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--paper)}
.photo-drop:hover,.photo-drop.drag{border-color:var(--gold)}
.photo-drop input{display:none}
.photo-drop .plabel{font-weight:600;font-size:14px}
.photo-drop .phint{font-size:12px;color:var(--ink-3);margin-top:4px}
.photo-actions{max-width:340px;margin:16px auto 0;display:flex;gap:10px}
.photo-status{max-width:340px;margin:12px auto 0;font-size:12.5px;text-align:center;color:var(--ink-3)}
.import-divider::before,.import-divider::after{content:"";flex:1;height:1px;background:var(--line)}
.import-zone{border:1.5px dashed var(--line);padding:22px;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--paper)}
.import-zone:hover,.import-zone.drag{border-color:var(--gold)}
.import-zone input{display:none}
.import-zone .ilabel{font-weight:600;font-size:14px}
.import-zone .ihint{font-size:12px;color:var(--ink-3);margin-top:4px}
.import-status{margin-top:14px;padding:12px 14px;border-radius:2px;font-size:13px;display:none}
.import-status.err{display:block;background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.3);color:#a33}
.import-status.ok{display:block;background:rgba(74,124,89,.08);border:1px solid rgba(74,124,89,.3);color:#3a6b4a}
.map-table{margin-top:14px;border:1px solid var(--line);display:none}
.map-table.show{display:block}
.map-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line)}
.map-row:last-child{border-bottom:none}
.map-row .field-name{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3)}
.map-row select{width:100%;padding:8px 10px;border:1px solid var(--line);background:var(--paper);font-size:13px}
.map-actions{display:flex;gap:10px;padding:14px;justify-content:flex-end}
.paste:focus{border-color:var(--gold)}
.parsed{margin-top:16px;border-top:1px solid var(--line)}
.parsed .g{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);font-size:14px;align-items:center}
.parsed .g .e{color:var(--ink-3);font-size:13px}
.parsed .g .x{color:var(--sage);font-size:15px;width:26px;text-align:center}
.parsed .g .x:hover{color:var(--ink)}

/* finish */
.saving{text-align:center;padding:60px 0}
.mono-pulse{width:76px;height:76px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:26px;color:var(--gold-deep);margin:0 auto 24px;animation:breathe 2.2s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.06);opacity:1}}
.savelog{font-size:13px;color:var(--sage);letter-spacing:.06em;min-height:20px}
.done-card{background:var(--paper);border:1px solid var(--line);padding:26px;margin-bottom:16px}
.done-card h3{font-family:var(--disp);font-size:22px;font-weight:600;margin-bottom:8px}
.done-card p{font-size:14px;color:var(--ink-3)}
.keybox{display:flex;gap:10px;margin-top:14px}
.keybox input{flex:1;border:1px solid var(--line);padding:13px;font-size:13px;color:var(--ink-3);background:var(--ivory)}
.warn{background:#FBF5E6;border:1px solid var(--gold-soft);padding:14px 16px;font-size:13px;color:var(--gold-deep);margin-top:14px}
.notice{position:fixed;bottom:0;left:0;right:0;background:var(--ink);color:var(--ivory);font-size:13.5px;text-align:center;padding:14px 20px;transform:translateY(100%);transition:transform .4s cubic-bezier(.22,1,.36,1);z-index:200}
.notice.on{transform:none}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <symbol id="ic-check" viewBox="0 0 24 24"><path d="M4 12.5 9.5 18 20 6.5"/></symbol>
  <symbol id="ic-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11"/><path d="M5 15V4h11"/></symbol>
</svg>
<div class="topbar">
  <div class="topbar-in"><div class="wordmark">Kymella</div><div class="step-count" id="stepCount"></div></div>
  <div class="progress"><i id="prog"></i></div>
</div>
<div class="wrap"><div class="screen" id="screen"></div></div>
<div class="notice" id="notice"></div>
<script>
/* ================= wizard state ================= */
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
function notice(m){ const n=$("notice"); n.textContent=m; n.classList.add("on"); clearTimeout(n._t); n._t=setTimeout(()=>n.classList.remove("on"),2800); }

let SESSION_ID = new URLSearchParams(location.search).get("session_id");
const FOUNDER_KEY = new URLSearchParams(location.search).get("founder_key"); // for free, unlimited real-flow testing -- never share this URL
// Set on the Kymella picker page before checkout, and read here once, straight after purchase —
// this is how the couple's chosen hero effect + palette survives the Stripe round-trip.
let CHOSEN_EXPERIENCE = null;
try {
  const raw = sessionStorage.getItem("kymella_experience");
  if (raw) CHOSEN_EXPERIENCE = JSON.parse(raw);
} catch (e) { /* no experience chosen — falls back to the ripple default already set on the backend */ }
// Founder testing convenience: ?founder_key=...&effect=diya lets any theme be tested directly
// from the URL, without needing to visit the experience picker page first just to get
// CHOSEN_EXPERIENCE set in storage. Only takes effect when the founder key is present, and
// only overrides when a recognized effect name is actually given.
if (FOUNDER_KEY) {
  const effectParam = new URLSearchParams(location.search).get("effect");
  if (["ripple","diya","frost"].includes(effectParam)) {
    CHOSEN_EXPERIENCE = { effect: effectParam, palette: { ink:"#0E1F1C", ink2:"#152D28", brass:"#B8874A", brassSoft:"#E8C9A0", brassDeep:"#8E6836", mist:"#F5EFE3" } };
  }
}
// Names typed once on the experience compare page, so the couple never retypes them here.
let CHOSEN_NAMES = null;
try {
  const raw = sessionStorage.getItem("kymella_names");
  if (raw) CHOSEN_NAMES = JSON.parse(raw);
} catch (e) { /* no names carried over — wizard just starts blank, as before */ }
let step = 0;
const S = {
  partner1: CHOSEN_NAMES?.partner1 || "", partner2: CHOSEN_NAMES?.partner2 || "", wedding_date:"", venue:"", venue_address:"",
  events: [
    {on:true,  day_label:"", time_label:"4:00 PM",  title:"Ceremony",       location:"", description:""},
    {on:true,  day_label:"", time_label:"6:30 PM",  title:"Reception",      location:"", description:""},
    {on:false, day_label:"", time_label:"6:30 PM",  title:"Welcome Dinner", location:"", description:""},
    {on:false, day_label:"", time_label:"10:30 AM", title:"Farewell Brunch",location:"", description:""},
  ],
  story: [
    {q:"How did you meet?",           title:"How we met",  ex:"A mutual friend's terrible barbecue, 2019.",             year:"", text:""},
    {q:"The moment one of you knew",  title:"The moment",  ex:"Somewhere between a canceled flight and a diner at 2am.", year:"", text:""},
    {q:"Why this day, why each other",title:"Today",       ex:"Ten years in, and we still argue about the aux cord.",    year:"", text:""},
  ],
  dress_code:"", arrival_info:"", parking_info:"", kids_policy:"", travel_info:"", hashtag:"",
  hotels: [],
  registry_note:"Your presence is the greatest gift. Should you wish to contribute, we've set aside a few funds below.",
  funds: [],
  voice_notes_enabled: false, // off by default -- couples opt in, not out
  guests: [],   // computed union of _pasted + _imported -- never written to directly
  _pasted: [],  // derived fresh from the paste textarea on every keystroke
  _imported: [], // accumulated from CSV/XLSX imports -- untouched by the textarea
  // Up to three photos, shown exactly as uploaded (full colour). Slot 1 is the full-bleed
  // hero the theme effect plays over; slots 2-3 sit as a pair in the story section. Each
  // entry is { data, focus } -- focus (0-100) is the vertical framing chosen with the slider,
  // so faces stay in frame however the hero crops on different screens.
  photos: { 1: null, 2: null, 3: null },
};

const STEPS = ["welcome","basics","events","story","photo","practical","registry","guests","finish"];
const TITLES = ["","The two of you","Your celebration","Your story","A portrait","The practical details","Your registry","Your guest list",""];

function draw(){
  const total = STEPS.length - 2; // welcome & finish not counted
  $("prog").style.width = (step===0?0: step>=STEPS.length-1?100 : Math.round(step/(STEPS.length-1)*100)) + "%";
  $("stepCount").textContent = (step>0 && step<STEPS.length-1) ? `Step ${step} of ${total}` : "";
  const sc = $("screen");
  sc.classList.remove("screen"); void sc.offsetWidth; sc.classList.add("screen");
  const name = STEPS[step];

  if (name==="welcome"){
    sc.innerHTML = `
      <div class="label">Welcome</div>
      <h1 class="h1">Let's set up your wedding</h1>
      <p class="lede">Seven short questions, about ten minutes. When you're done, you'll open your own invitation exactly as your guests will, and every detail you share here teaches your concierge how to answer their questions.</p>
      <p class="hint">You can leave anything blank and return to it later. By continuing you agree to our <a class="textlink" href="/privacy" target="_blank" rel="noopener">Terms &amp; Privacy policy</a>.</p>
      <div class="nav"><span></span><div class="right"><button class="btn btn-gold" onclick="next()">Begin</button></div></div>`;
  }
  else if (name==="basics"){
    sc.innerHTML = `
      <div class="label muted">${TITLES[step]}</div>
      <h1 class="h1">First, the essentials</h1>
      <div class="two">
        <div class="field"><label>Partner one</label><input id="f-p1" placeholder="Full name" value="${esc(S.partner1)}"></div>
        <div class="field"><label>Partner two</label><input id="f-p2" placeholder="Full name" value="${esc(S.partner2)}"></div>
      </div>
      <div class="field"><label>Wedding date</label><input id="f-date" type="date" value="${esc(S.wedding_date)}"></div>
      <div class="field"><label>Venue</label><input id="f-venue" placeholder="e.g. The Rosewood Estate" value="${esc(S.venue)}"></div>
      <div class="field"><label>Venue address <em>· powers the map & directions</em></label><input id="f-addr" placeholder="Street, city" value="${esc(S.venue_address)}"></div>
      ${navHtml(true)}`;
  }
  else if (name==="events"){
    sc.innerHTML = `
      <div class="label muted">${TITLES[step]}</div>
      <h1 class="h1">What's happening, and when?</h1>
      <p class="lede">We've started the usual moments for you. Switch on what applies, adjust the rest.</p>
      <div style="margin-top:26px">
        ${S.events.map((e,i)=>`
          <div class="tglrow">
            <div style="flex:1">
              <div class="t">${esc(e.title)}</div>
              ${e.on?`<div class="rowgrid" style="margin-top:10px">
                <input placeholder="Day (e.g. Sat, Aug 15)" value="${esc(e.day_label)}" onchange="S.events[${i}].day_label=this.value">
                <input placeholder="Time" value="${esc(e.time_label)}" onchange="S.events[${i}].time_label=this.value">
                <input placeholder="Location" value="${esc(e.location)}" onchange="S.events[${i}].location=this.value">
              </div>
              <textarea placeholder="What to expect (optional): this is the part guests touch to reveal on their invite" rows="2" style="margin-top:8px;width:100%" onchange="S.events[${i}].description=this.value">${esc(e.description||"")}</textarea>`:""}
            </div>
            <button class="tgl ${e.on?"on":""}" onclick="S.events[${i}].on=!S.events[${i}].on;draw()" aria-label="Toggle ${esc(e.title)}"></button>
          </div>`).join("")}
      </div>
      <button class="addrow" onclick="S.events.push({on:true,day_label:'',time_label:'',title:'New event',location:'',description:''});draw()">+ Add another event</button>
      <p class="hint">Mehndi, sangeet, tea ceremony, after-party: add whatever your celebration holds.</p>
      ${navHtml(true)}`;
    // make custom event titles editable
    sc.querySelectorAll(".tglrow .t").forEach((el,i)=>{
      el.contentEditable = true;
      el.addEventListener("blur", ()=>{ S.events[i].title = el.textContent.trim() || "Event"; });
    });
  }
  else if (name==="story"){
    sc.innerHTML = `
      <div class="label muted">${TITLES[step]}</div>
      <h1 class="h1">Tell it the way you tell it at dinner</h1>
      <p class="lede">Three prompts, aimed at the specific over the generic. A few sentences each is plenty, and it's fine to leave one blank if it doesn't fit your story.</p>
      <div style="margin-top:26px">
        ${S.story.map((s,i)=>`<div class="prompt">
          <div class="pq">${esc(s.q)}</div>
          <input placeholder="Year" value="${esc(s.year)}" onchange="S.story[${i}].year=this.value">
          <textarea placeholder="e.g. ${esc(s.ex)}" onchange="S.story[${i}].text=this.value">${esc(s.text)}</textarea>
        </div>`).join("")}
      </div>
      ${navHtml(true, "Continue", true)}`;
  }
  else if (name==="photo"){
    const anyPhoto = S.photos[1] || S.photos[2] || S.photos[3];
    // Only the hero (slot 1) crops to fill the viewport, so only it needs a framing slider --
    // slots 2-3 show the whole photo at its own natural proportions on the invite (no crop),
    // so a "framing" control for them would promise something that doesn't actually happen.
    const slotBlock = (slot, title, hint, cropped) => {
      const p = S.photos[slot];
      if (!p) return `
        <div class="photo-drop" style="margin-top:${slot===1?"26px":"14px"}" onclick="document.getElementById('photoFile${slot}').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="event.preventDefault();this.classList.remove('drag');handlePhotoFile(${slot}, event.dataTransfer.files[0])">
          <input type="file" id="photoFile${slot}" accept="image/*" onchange="handlePhotoFile(${slot}, this.files[0])">
          <div class="plabel">${title}</div>
          <div class="phint">${hint}</div>
        </div>`;
      const previewStyle = cropped
        ? `width:100%;aspect-ratio:16/9;object-fit:cover;object-position:50% ${p.focus}%;border-radius:2px;display:block`
        : `width:100%;height:auto;border-radius:2px;display:block`;
      return `

function navHtml(back, okLabel="Continue", skippable=false){
  return `<div class="nav">
    ${back?`<button class="btn btn-quiet sm" onclick="prev()">Back</button>`:"<span></span>"}
    <div class="right">
      ${skippable?`<button class="textlink" onclick="next(true)">Skip this step</button>`:""}
      <button class="btn btn-solid" onclick="next()">${okLabel}</button>
    </div></div>`;
}
function collect(){
  const g = id => $(id)?.value.trim() ?? null;
  if (STEPS[step]==="basics"){ S.partner1=g("f-p1"); S.partner2=g("f-p2"); S.wedding_date=g("f-date"); S.venue=g("f-venue"); S.venue_address=g("f-addr"); }
  if (STEPS[step]==="practical"){ S.dress_code=g("f-dress"); S.arrival_info=g("f-arrival"); S.parking_info=g("f-parking"); S.kids_policy=g("f-kids"); S.travel_info=g("f-travel"); S.hashtag=g("f-hashtag"); }
}
function next(skip){
  collect();
  if (STEPS[step]==="basics" && !skip){
    if (!S.partner1 || !S.partner2 || !S.wedding_date){ notice("Your names and the date are the one thing we truly need."); return; }
  }
  step = Math.min(STEPS.length-1, step+1); draw();
}
function prev(){ collect(); step = Math.max(0, step-1); draw(); }

function photoStatus(msg){ const el = $("photoStatus"); if (el) el.textContent = msg || ""; }
function handlePhotoFile(slot, file){
  if (!file) return;
  photoStatus("Reading " + file.name + "…");
  const reader = new FileReader();
  reader.onerror = () => photoStatus("Could not read that file. Please try a different photo.");
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      if (!img.naturalWidth){ photoStatus("That photo loaded but seems empty -- try a different one, or a screenshot of it."); return; }
      // Real phone photos are routinely 5-15MB+ at full resolution -- far more than the invite
      // needs (the server re-compresses to its own web sizes anyway), and more than some mobile
      // networks can reliably upload without timing out. Downscale and re-encode here so what
      // actually gets sent is small and fast regardless of the original size.
      const MAX_DIM = 1600;
      const scale = Math.min(1, MAX_DIM / Math.max(img.naturalWidth, img.naturalHeight));
      const w = Math.round(img.naturalWidth * scale), h = Math.round(img.naturalHeight * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      S.photos[slot] = { data: canvas.toDataURL("image/jpeg", 0.85), focus: 40 };
      photoStatus("");
      draw(); // re-render the step so the slot flips from drop-zone to preview + framing slider
    };
    img.onerror = () => photoStatus("This browser couldn't open that photo (unsupported format). If it's a HEIC photo straight from an iPhone camera, try a screenshot of it instead.");
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

/* guests parsing */
function parseGuests(raw){
  S._raw = raw;
  S._pasted = raw.split("\n").map(l=>l.trim()).filter(Boolean).map(l=>{
    const [name, email] = l.split(",").map(x=>x?.trim());
    return { name, email: (email && email.includes("@")) ? email : "" };
  }).filter(g=>g.name);
  recomputeGuests();
}
function recomputeGuests(){
  // The list a couple sees and publishes is always both sources combined -- typing in the
  // paste box and importing a spreadsheet are additive, not either/or, and neither can
  // silently erase what the other one added.
  S.guests = [...S._pasted, ...S._imported];
  $("parsedList").innerHTML = parsedHtml();
  const btn = $("guestsNextBtn");
  if (btn) btn.textContent = S.guests.length ? "Continue" : "Skip for now";
}
function parsedHtml(){
  if (!S.guests.length) return "";
  return `<p class="hint" style="padding:12px 2px 4px">${S.guests.length} ${S.guests.length===1?"guest":"guests"} recognised, each will receive their own personal invitation link.</p>` +
    S.guests.map((g,i)=>`<div class="g"><b>${esc(g.name)}</b><span class="e">${esc(g.email)}</span><button class="x" onclick="removeGuest(${i})" aria-label="Remove">×</button></div>`).join("");
}
function removeGuest(i){
  if (i < S._pasted.length){
    S._pasted.splice(i, 1);
    S._raw = S._pasted.map(g=>g.email?`${g.name}, ${g.email}`:g.name).join("\n");
  } else {
    S._imported.splice(i - S._pasted.length, 1);
  }
  recomputeGuests();
  draw();
}

/* ================= spreadsheet import (CSV / XLSX) ================= */
// Column names vary a lot between people's own spreadsheets -- this matches common variants
// rather than requiring an exact template, since most couples will bring whatever list they
// already have, not one built for this specific form.
const COLUMN_ALIASES = {
  name:      ["name","full name","guest name","guest","full_name","first name"],
  email:     ["email","e-mail","email address","mail"],
  phone:     ["phone","phone number","mobile","cell","telephone","contact"],
  max_party: ["party size","max party","seats","number of guests","# of guests","guests","party","pax","headcount"],
  grp:       ["group","side","family","category","tag","list"],
};
function detectColumn(headers, field){
  const aliases = COLUMN_ALIASES[field];
  const normalized = headers.map(h => (h||"").toString().toLowerCase().trim());
  for (const alias of aliases){ const idx = normalized.indexOf(alias); if (idx >= 0) return idx; }
  for (let i=0;i<normalized.length;i++){ if (aliases.some(a => normalized[i].includes(a))) return i; }
  return -1;
}
function importStatus(msg, kind){
  const el = $("importStatus");
  el.textContent = msg; el.className = "import-status" + (kind ? " " + kind : "");
}
let _pendingImportRows = null, _pendingImportHeaders = null;

function handleSpreadsheetFile(file){
  if (!file) return;
  importStatus("Reading " + file.name + "…", "ok");
  const isCsv = /\.csv$/i.test(file.name);
  const reader = new FileReader();
  reader.onerror = () => importStatus("Could not read that file. Please try again, or use the paste box above instead.", "err");
  reader.onload = () => {
    try {
      if (isCsv){
        const parsed = Papa.parse(reader.result, { header:true, skipEmptyLines:true });
        if (parsed.errors && parsed.errors.length && !parsed.data.length){
          importStatus("Couldn't read that as a CSV file. Double-check it exported correctly, or paste your list above instead.", "err"); return;
        }
        openMapping(parsed.meta.fields || [], parsed.data);
      } else {
        const wb = XLSX.read(reader.result, { type: "array" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
        const headers = rows.length ? Object.keys(rows[0]) : [];
        if (!rows.length){ importStatus("That file opened but had no rows on the first sheet. If your guests are on a different sheet/tab, try re-saving just that sheet as its own file.", "err"); return; }
        openMapping(headers, rows);
      }
    } catch (e){
      importStatus("Couldn't read that file (" + e.message + "). Please double check it's a real .csv or .xlsx export, or paste your list above instead.", "err");
    }
  };
  if (isCsv) reader.readAsText(file); else reader.readAsArrayBuffer(file);
}

function openMapping(headers, rows){
  if (!headers.length){ importStatus("That file didn't have any column headers we could read.", "err"); return; }
  _pendingImportHeaders = headers; _pendingImportRows = rows;
  const guess = {
    name: detectColumn(headers, "name"), email: detectColumn(headers, "email"),
    phone: detectColumn(headers, "phone"), max_party: detectColumn(headers, "max_party"), grp: detectColumn(headers, "grp"),
  };
  const opts = (selected) => `<option value="-1">(none)</option>` + headers.map((h,i) => `<option value="${i}" ${i===selected?"selected":""}>${esc(h || "(blank header)")}</option>`).join("");
  const fieldRow = (field, label, required) => `<div class="map-row"><div class="field-name">${label}${required?" *":""}</div><select id="map-${field}">${opts(guess[field])}</select></div>`;
  $("mapTable").innerHTML = `
    ${fieldRow("name","Name",true)}
    ${fieldRow("email","Email",false)}
    ${fieldRow("phone","Phone",false)}
    ${fieldRow("max_party","Party size",false)}
    ${fieldRow("grp","Group",false)}
    <div class="map-actions">
      <button class="btn btn-quiet sm" onclick="cancelImport()">Cancel</button>
      <button class="btn btn-solid sm" onclick="confirmImport()">Import ${rows.length} ${rows.length===1?"row":"rows"}</button>
    </div>`;
  $("mapTable").classList.add("show");
  importStatus(rows.length + " rows found. Check the column matches below look right, then import.", "ok");
}
function cancelImport(){
  $("mapTable").classList.remove("show"); $("mapTable").innerHTML = "";
  importStatus("", ""); $("f-file").value = "";
  _pendingImportRows = null; _pendingImportHeaders = null;
}
function confirmImport(){
  const col = f => { const v = Number($("map-"+f).value); return v; };
  const nameIdx = col("name");
  if (nameIdx < 0){ importStatus("Please choose which column has each guest's name before importing.", "err"); return; }
  const emailIdx = col("email"), phoneIdx = col("phone"), partyIdx = col("max_party"), grpIdx = col("grp");
  const headers = _pendingImportHeaders;
  let added = 0, skipped = 0;
  _pendingImportRows.forEach(row => {
    const cellAt = idx => idx < 0 ? "" : String(row[headers[idx]] ?? "").trim();
    const name = cellAt(nameIdx);
    if (!name){ skipped++; return; }
    const g = { name, email: "" };
    const email = cellAt(emailIdx); if (email && email.includes("@")) g.email = email;
    const phone = cellAt(phoneIdx); if (phone) g.phone = phone;
    const grp = cellAt(grpIdx); if (grp) g.grp = grp;
    const partyRaw = cellAt(partyIdx); const partyNum = parseInt(partyRaw, 10);
    if (partyRaw && !isNaN(partyNum) && partyNum > 0) g.max_party = partyNum;
    S._imported.push(g); added++;
  });
  recomputeGuests();
  cancelImport();
  importStatus(`Added ${added} guest${added===1?"":"s"}${skipped?` (${skipped} row${skipped===1?"":"s"} skipped, no name found)`:""}.`, "ok");
}

/* ================= publish: the wizard's API sequence ================= */
async function api(path, method, body, key, extraHeaders){
  const r = await fetch(path, { method, headers: Object.assign({"Content-Type":"application/json"}, key?{"x-admin-key":key}:{}, extraHeaders||{}), body: body?JSON.stringify(body):undefined });
  const j = await r.json().catch(()=> ({}));
  if (!r.ok) throw new Error(j.error || "Request failed");
  return j;
}
async function publish(){
  const log = m => { $("saveLog").textContent = m; };
  try{
    log("Creating your wedding…");
    const created = await api("/api/weddings","POST",{ partner1:S.partner1, partner2:S.partner2, wedding_date:S.wedding_date, venue:S.venue||"", checkout_session:SESSION_ID }, null, FOUNDER_KEY ? {"x-setup-key":FOUNDER_KEY} : {});
    const { id, admin_key, slug } = created;

    if (created.resumed){
      // A previous publish attempt got partway: same purchase, same wedding. Clear whatever
      // it managed to save so this clean retry can't create duplicate events/funds/guests.
      log("Resuming your earlier attempt…");
      try{
        const dash = await api(`/api/weddings/${id}/dashboard`,"GET",null, admin_key);
        for (const ev of (dash.events||[])) await api(`/api/weddings/${id}/events/${ev.id}`,"DELETE",null, admin_key);
        for (const f of (dash.registry||[])) await api(`/api/weddings/${id}/registry/${f.id}`,"DELETE",null, admin_key);
        for (const g of (dash.guests||[])) await api(`/api/weddings/${id}/guests/${g.id}`,"DELETE",null, admin_key);
      }catch(e){ /* best effort — publish continues either way */ }
    }

    log("Saving your details…");
    await api(`/api/weddings/${id}`,"PUT",{
      venue_address:S.venue_address||"", dress_code:S.dress_code||"", arrival_info:S.arrival_info||"",
      parking_info:S.parking_info||"", kids_policy:S.kids_policy||"", travel_info:S.travel_info||"",
      story_json: S.story.filter(s=>s.text).map(s=>({year:s.year||"", title:s.title, text:s.text})),
      hotels_json: S.hotels.filter(h=>h.name),
      faq_json: buildFaq(),
      registry_note: S.funds.length ? S.registry_note : "",
      voice_notes_enabled: !!S.voice_notes_enabled,
      ...(CHOSEN_EXPERIENCE ? { hero_effect: CHOSEN_EXPERIENCE.effect, palette_json: CHOSEN_EXPERIENCE.palette } : {}),
    }, admin_key);

    const evs = S.events.filter(e=>e.on && e.title);
    if (evs.length){ log("Placing your events…");
      for (let i=0;i<evs.length;i++) await api(`/api/weddings/${id}/events`,"POST",{...evs[i], sort:i}, admin_key);
    }
    const funds = S.funds.filter(f=>f.title);
    if (funds.length){ log("Opening your registry…");
      for (let i=0;i<funds.length;i++) await api(`/api/weddings/${id}/registry`,"POST",{ title:funds[i].title, description:funds[i].description||"", goal_cents:Math.round((parseFloat(funds[i].goal)||0)*100), external_url:funds[i].external_url||"", sort:i}, admin_key);
    }

    for (const slot of [1, 2, 3]){
      if (!S.photos[slot]) continue;
      log(slot === 1 ? "Saving your hero photo…" : "Saving your story photos…");
      try{ await api(`/api/weddings/${id}/photos/${slot}`,"POST",{ image:S.photos[slot].data, focus:S.photos[slot].focus }, admin_key); }
      catch(e){
        // Non-fatal by design -- the wedding must still publish even if a photo fails --
        // but silent failure here is exactly what made an earlier bug invisible, so this
        // gets a real pause and a visible reason instead of vanishing without a trace.
        log(`One of your photos didn't save (${e.message || "unknown error"}). Continuing without it.`);
        await new Promise(r => setTimeout(r, 2200));
      }
    }

    log("Writing your own invitation…");
    const preview = await api(`/api/weddings/${id}/guests`,"POST",{ name:`${S.partner1.split(" ")[0]} & ${S.partner2.split(" ")[0]}`, grp:"Preview", max_party:2 }, admin_key);
    const previewUrl = preview.guests[0].invite_url;

    let guestRows = [];
    if (S.guests.length){ log(`Preparing ${S.guests.length} invitations…`);
      const res = await api(`/api/weddings/${id}/guests`,"POST", S.guests.map(g=>({name:g.name,email:g.email,phone:g.phone||"",grp:g.grp||"Friends",max_party:g.max_party||2})), admin_key);
      guestRows = res.guests;
    }
    finishScreen({ id, admin_key, slug, previewUrl, guestRows });
  }catch(e){
    $("screen").innerHTML = `<div class="label muted">A moment</div><h1 class="h1">That didn't save</h1>
      <p class="lede">${esc(e.message)}. Nothing you typed is lost. Please try again.</p>
      <div class="nav"><button class="btn btn-quiet sm" onclick="step=1;draw()">Review details</button><button class="btn btn-solid" onclick="retryPublish()">Try again</button></div>`;
  }
}
async function retryPublish(){
  // The server resumes the same wedding for this purchase, so a retry is just... trying again.
  // No new checkout, no second payment.
  draw();
}
function buildFaq(){
  // dress_code, arrival_info, parking_info, and kids_policy each already get their own card in
  // the invite's Essentials section (template-invite.html's .dcard grid) -- auto-pushing them
  // in here too meant the exact same sentence showed up twice on the same page, once as a card
  // and again as an FAQ answer. travel_info has no card of its own anywhere on the invite, so
  // it stays here as the only place a guest ever sees it. Phrased the way a guest actually
  // texts, not a formal FAQ document -- and the last three need no new field at all, they're
  // built entirely from data collected elsewhere (allergies are always askable at RSVP,
  // registry funds/hashtag just need to exist).
  const f=[];
  if (S.travel_info)  f.push({q:"How do I get there from out of town?", a:S.travel_info});
  if (S.hashtag)       f.push({q:"Is there a wedding hashtag?", a:`Yes! Use ${S.hashtag} whenever you post photos from the day.`});
  if (S.funds.length)  f.push({q:"Do you have a gift registry?", a: S.registry_note || "We've set up a few funds below, see the Registry section for details."});
  f.push({q:"What if I have a dietary restriction or allergy?", a:"Let us know when you RSVP below and we'll make sure it's taken care of."});
  return f;
}
function finishScreen({id, admin_key, previewUrl, guestRows}){
  const manageUrl = `${location.origin}/manage#w=${id}&k=${admin_key}`;
  $("prog").style.width="100%"; $("stepCount").textContent="";
  $("screen").innerHTML = `
    <div class="label">It's ready</div>
    <h1 class="h1">Your wedding awaits</h1>
    <p class="lede">Before anything else, open your own invitation, exactly as your guests will. Touch the seal.</p>
    <div class="nav" style="margin-top:26px;justify-content:flex-start"><a class="btn btn-gold" href="${previewUrl}" target="_blank" rel="noopener">Open my invitation</a></div>

    <div class="done-card" style="margin-top:40px"><h3>Your private dashboard</h3>
      <p>RSVPs, meal counts, guest questions, and every invitation link live here. This link is the key to your wedding, save it somewhere safe.</p>
      <div class="keybox"><input readonly value="${manageUrl}" id="mUrl"><button class="btn btn-quiet sm" onclick="copy('mUrl')"><svg class="i"><use href="#ic-copy"/></svg> Copy</button></div>
      <div class="warn">Anyone with this link can manage your wedding. Treat it like a password: we can't recover it if lost.</div>
    </div>

    ${guestRows.length?`<div class="done-card"><h3>${guestRows.length} invitations, ready to send</h3>
      <p>Each guest has their own personal link. Send them yourself over WhatsApp or text: an invitation should come from you, not from a platform. They're all in your dashboard too.</p>
      <div style="margin-top:14px">${guestRows.slice(0,5).map(g=>`
        <div class="keybox" style="margin-top:8px"><input readonly value="${g.invite_url}" id="g${g.id}"><button class="btn btn-quiet sm" onclick="copy('g${g.id}','${esc(g.name)}')">Copy</button></div>
        <p class="hint" style="margin:2px 0 0 2px">${esc(g.name)}</p>`).join("")}
      ${guestRows.length>5?`<p class="hint" style="margin-top:12px">…and ${guestRows.length-5} more in your dashboard.</p>`:""}</div>
    </div>`:""}
    <div class="nav" style="justify-content:flex-start"><a class="btn btn-solid" href="${manageUrl}">Go to my dashboard</a></div>`;
}
function copy(id, name){
  $(id).select(); document.execCommand("copy");
  try{ navigator.clipboard?.writeText($(id).value); }catch(e){}
  notice(name ? `${name}'s invitation link copied.` : "Copied.");
}
async function gate(){
  if (FOUNDER_KEY){ draw(); return; } // founder testing: skip Stripe entirely, straight into the real wizard
  try{
    const r = await fetch(`/api/checkout/verify?session_id=${encodeURIComponent(SESSION_ID||"")}`);
    const v = await r.json();
    if (v.ok){ draw(); return; }
    if (v.reason==="used"){
      // This purchase already started a wedding (likely an interrupted earlier attempt).
      // Let them straight back in -- publish resumes the same wedding, no second payment.
      notice("Welcome back. Picking up where you left off.");
      draw(); return;
    }
    $("screen").innerHTML = `
      <div class="label muted">One step first</div>
      <h1 class="h1">Your wedding starts here</h1>
      <p class="lede">Kymella is a single purchase: one wedding, every feature, no subscription. Complete checkout and you will land right back here.</p>
      <div class="nav" style="justify-content:flex-start;gap:14px">
        <button class="btn btn-gold" onclick="startCheckout()">Continue to checkout</button>
        <a class="textlink" href="/" target="_blank" rel="noopener">Try the live experience first</a>
      </div>
      <p class="hint" style="margin-top:22px">By purchasing you agree to our <a class="textlink" href="/privacy" target="_blank" rel="noopener">Terms, Privacy &amp; Refund policy</a>.</p>`;
  }catch(e){ draw(); } // network hiccup: let the API gate enforce
}
async function startCheckout(){
  try{ const r=await fetch("/api/checkout",{method:"POST"}); const j=await r.json();
    if (j.url) location.href=j.url; else notice(j.error || "Checkout is unavailable right now.");
  }catch(e){ notice("Checkout is unavailable right now."); }
}
gate();
</script>
