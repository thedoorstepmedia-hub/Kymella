<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Inquiries — Kymella</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E1F1C; --ink-2:#152D28; --ink-3:#26433C;
  --mist:#F5EFE3; --mist-dim:#EDE5D4;
  --brass:#B8874A; --brass-soft:#E8C9A0; --brass-deep:#8E6836;
  --line:rgba(14,31,28,.12);
  --disp:'Fraunces',Georgia,serif; --body:'Inter',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);background:var(--mist);color:var(--ink);font-size:14.5px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:var(--body);cursor:pointer;border:none;background:none}
input{font-family:var(--body);font-size:15px}
:focus-visible{outline:2px solid var(--brass);outline-offset:3px}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;color:var(--brass-deep)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-radius:1px}
.btn-brass{background:var(--brass);color:var(--ink)}
.btn-quiet{border:1px solid var(--line);color:var(--ink)}
.btn-quiet:hover{border-color:var(--brass)}

.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-box{max-width:380px;width:100%;text-align:center}
.gate h1{font-family:var(--disp);font-size:28px;font-weight:500;margin:12px 0 22px}
.gate input{width:100%;border:1px solid var(--line);padding:14px 16px;outline:none;margin-bottom:14px;background:#fff}
.gate-error{color:#A4523F;font-size:13px;margin-top:12px;display:none}

.app{display:none;max-width:920px;margin:0 auto;padding:44px 22px 90px}
.top{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px;margin-bottom:30px}
.top h1{font-family:var(--disp);font-size:30px;font-weight:500}
.count{font-family:var(--mono);font-size:12px;color:var(--ink-3)}

.card{background:#fff;border:1px solid var(--line);margin-bottom:14px}
.card-head{display:grid;grid-template-columns:1fr auto auto auto;gap:14px;align-items:center;padding:18px 20px;cursor:pointer}
.card-head .names{font-family:var(--disp);font-size:19px;font-weight:600}
.card-head .sub{font-size:12px;color:var(--ink-3);margin-top:3px}
.tag{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:12px}
.tag.complete{background:#DCEFDF;color:#2D6A3E}
.tag.progress{background:var(--mist-dim);color:var(--ink-3)}
.tag.interactive{background:#EDE0C8;color:var(--brass-deep)}
.tag.rsvp{background:#DCE7E2;color:var(--ink-3)}
.tag.both{background:var(--ink);color:var(--mist)}
.chev{color:var(--ink-3);transition:transform .2s}
.card.open .chev{transform:rotate(180deg)}
.detail{display:none;padding:0 20px 20px;border-top:1px solid var(--line)}
.card.open .detail{display:block}
.dl{display:grid;grid-template-columns:110px 1fr;gap:6px 14px;font-size:13px;padding:16px 0}
.dl dt{color:var(--ink-3);font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding-top:2px}
.dl dd{color:var(--ink)}
.transcript{background:var(--mist-dim);padding:14px 16px;max-height:340px;overflow-y:auto;font-size:13px}
.tmsg{margin-bottom:10px}
.tmsg b{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--brass-deep);display:block;margin-bottom:2px}
.tmsg.assistant b{color:var(--ink-3)}
.empty{text-align:center;padding:60px 20px;color:var(--ink-3)}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-box">
    <div class="eyebrow">Kymella</div>
    <h1>Inquiries</h1>
    <input type="password" id="keyInput" placeholder="Admin key" autocomplete="off">
    <button class="btn btn-brass" style="width:100%" id="unlockBtn">View inquiries</button>
    <p class="gate-error" id="gateError">That key didn't work. Try again.</p>
  </div>
</div>

<div class="app" id="app">
  <div class="top">
    <h1>Inquiries</h1>
    <div class="count" id="countLabel"></div>
  </div>
  <div id="list"></div>
</div>

<script>
const API = "https://evarria-backend-production.up.railway.app/api/kymella-inquiries";
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));

let ADMIN_KEY = sessionStorage.getItem("kymella_admin_key") || "";

async function load(key){
  try{
    const r = await fetch(API, { headers: { "x-setup-key": key } });
    if (r.status === 401) return { ok:false };
    if (!r.ok) throw new Error("request failed");
    return { ok:true, data: await r.json() };
  }catch(e){ return { ok:false, network:true }; }
}

function render(data){
  $("countLabel").textContent = `${data.count} ${data.count===1?"inquiry":"inquiries"}`;
  if (!data.inquiries.length){
    $("list").innerHTML = `<div class="empty">No inquiries yet — once the concierge is live, conversations will appear here.</div>`;
    return;
  }
  const interestLabel = { interactive:"Interactive", rsvp:"RSVP", both:"Both", "":"—" };
  $("list").innerHTML = data.inquiries.map((inq, i) => {
    const names = [inq.partner1, inq.partner2].filter(Boolean).join(" & ") || "Unnamed inquiry";
    const sub = [inq.email, inq.wedding_date, inq.location].filter(Boolean).join(" · ");
    const transcriptHtml = inq.transcript.map(m => `
      <div class="tmsg ${m.role}"><b>${m.role === "user" ? names : "Concierge"}</b>${esc(m.content)}</div>`).join("");
    const convertAction = inq.converted_wedding_id
      ? `<p style="font-size:12.5px;color:#2D6A3E;margin-top:4px">Wedding already created — id <code>${inq.converted_wedding_id}</code>. Use the admin_key you saved when it was created to build your manage link: /manage#w=${inq.converted_wedding_id}&k=YOUR_SAVED_KEY</p>`
      : `<button class="btn btn-brass" onclick="convertInquiry(${inq.id}, this)">Create wedding from this</button>
         <p class="convert-msg" id="convert-msg-${inq.id}" style="font-size:12.5px;margin-top:8px;display:none"></p>`;
    return `
      <div class="card" id="card-${i}">
        <div class="card-head" onclick="document.getElementById('card-${i}').classList.toggle('open')">
          <div><div class="names">${esc(names)}</div><div class="sub">${esc(sub)}</div></div>
          <span class="tag ${inq.interest||'none'}">${interestLabel[inq.interest]||"—"}</span>
          <span class="tag ${inq.complete?'complete':'progress'}">${inq.complete?"Complete":"In progress"}</span>
          <span class="chev">▾</span>
        </div>
        <div class="detail">
          <div class="dl">
            <dt>Guests</dt><dd>${esc(inq.guest_count)||"—"}</dd>
            <dt>Vibe</dt><dd>${esc(inq.vibe_description)||"—"}</dd>
            <dt>Notes</dt><dd>${esc(inq.notes)||"—"}</dd>
            <dt>Updated</dt><dd>${esc(inq.updated_at)}</dd>
          </div>
          <div style="padding:4px 0 16px">${convertAction}</div>
          <div class="transcript">${transcriptHtml || "<em>No messages yet.</em>"}</div>
        </div>
      </div>`;
  }).join("");
}
async function convertInquiry(id, btn){
  btn.disabled = true; btn.textContent = "Creating…";
  const msgEl = document.getElementById(`convert-msg-${id}`);
  try{
    const r = await fetch(`${API}/${id}/convert`, { method:"POST", headers:{"x-setup-key":ADMIN_KEY} });
    const data = await r.json();
    msgEl.style.display = "block";
    if (!r.ok){
      msgEl.style.color = "#A4523F";
      msgEl.textContent = data.error;
      btn.disabled = false; btn.textContent = "Create wedding from this";
      return;
    }
    msgEl.style.color = "#2D6A3E";
    const manageUrl = `https://evarria-backend-production.up.railway.app/manage#w=${data.id}&k=${data.admin_key}`;
    msgEl.innerHTML = `Wedding created — id <code>${esc(data.id)}</code>. Admin key (save this now, shown once): <code>${esc(data.admin_key)}</code><br>Dashboard: <a href="${manageUrl}" target="_blank" style="color:var(--brass-deep)">${manageUrl}</a><br>${esc(data.setup_note)}`;
    btn.style.display = "none";
  }catch(e){
    msgEl.style.display = "block"; msgEl.style.color = "#A4523F";
    msgEl.textContent = "Couldn't reach the server — please try again.";
    btn.disabled = false; btn.textContent = "Create wedding from this";
  }
}

async function unlock(key){
  const result = await load(key);
  if (!result.ok){
    $("gateError").style.display = "block";
    $("gateError").textContent = result.network ? "Couldn't reach the server." : "That key didn't work.";
    return;
  }
  sessionStorage.setItem("kymella_admin_key", key);
  ADMIN_KEY = key;
  $("gate").style.display = "none";
  $("app").style.display = "block";
  render(result.data);
}
$("unlockBtn").addEventListener("click", () => { const k=$("keyInput").value.trim(); if(k) unlock(k); });
$("keyInput").addEventListener("keydown", e => { if (e.key==="Enter") $("unlockBtn").click(); });
if (ADMIN_KEY) unlock(ADMIN_KEY);
</script>
</body>
</html>
